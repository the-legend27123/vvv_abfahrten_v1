<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feldkirch Landesgericht – Abfahrtsmonitor</title>

  <script
    type="text/javascript"
    src="https://fahrplan.vmobil.at/webapp/staticfiles/hafas-widget-core.1.0.0.js?L=vs_vvv&">
  </script>

  <style>
    :root {
      --bg: #0b0f14;
      --panel-border: rgba(255,255,255,0.08);
      --text: #f5f7fa;
      --muted: #aab4bf;
      --shadow: 0 10px 30px rgba(0,0,0,0.28);
      --widget-scale: 1.9;
      --widget-width: 78.125%;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      padding: 20px 28px 10px;
    }

    .title {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
      font-weight: 700;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 15px;
      color: var(--muted);
    }

    .stage {
      flex: 1;
      min-height: 0;
      padding: 18px 28px 28px;
    }

    .monitor-shell {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #131a22, #0f141b);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .widget-wrap {
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: #ffffff;
      border-radius: 16px;
      overflow: auto;
      position: relative;
    }

    .zoom-wrap {
      transform: scale(var(--widget-scale));
      transform-origin: top left;
      width: var(--widget-width);
      min-height: 100%;
    }

    .footer {
      padding: 8px 28px 16px;
      font-size: 12px;
      color: var(--muted);
    }

    .widget-wrap,
    .widget-wrap * {
      font-family: Arial, Helvetica, sans-serif !important;
    }

    /* Linienbadge weiß */
    .force-badge-white,
    .force-badge-white * {
      color: #ffffff !important;
    }

    /* Datum / Text schwarz */
    .force-date-black,
    .force-date-black * {
      color: #000000 !important;
      opacity: 1 !important;
    }

    .force-text-black,
    .force-text-black * {
      color: #000000 !important;
      opacity: 1 !important;
    }

    /* Zeitfarben */
    .force-time-black {
      color: #111111 !important;
      opacity: 1 !important;
    }

    .force-time-red {
      color: #d81b60 !important;
      opacity: 1 !important;
    }

    .widget-wrap table,
    .widget-wrap tr,
    .widget-wrap td,
    .widget-wrap th {
      border-color: rgba(0,0,0,0.12) !important;
    }

    @media (max-width: 900px) {
      :root {
        --widget-scale: 1.16;
        --widget-width: 86.2%;
      }

      .topbar { padding: 16px 16px 8px; }
      .title { font-size: 26px; }
      .subtitle { font-size: 14px; }
      .stage { padding: 12px 16px 16px; }
      .monitor-shell { padding: 14px; border-radius: 16px; }
      .widget-wrap { border-radius: 12px; }
      .footer { padding: 6px 16px 12px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1 class="title">Feldkirch Landesgericht</h1>
    <p class="subtitle">VMOBIL Abfahrtsmonitor TEST</p>
  </div>

  <div class="stage">
    <div class="monitor-shell">
      <div class="widget-wrap" id="widgetWrap">
        <div class="zoom-wrap">
          <div
            data-hfs-widget="true"
            data-hfs-widget-sq="true"
            data-hfs-widget-sq-location="A=1@O=Feldkirch Landesgericht@X=9592030@Y=47236085@U=81@L=480082400@p=1774303212@i=A×at:48:824@"
            data-hfs-widget-sq-locationname="Feldkirch Landesgericht"
            style="width:100%;">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    Eingebettet über VMOBIL Widget
  </div>

  <script>
    function isTimeText(text) {
      return /^\d{1,2}:\d{2}$/.test((text || "").trim());
    }

    function isDateText(text) {
      return /(\bMo\b|\bDi\b|\bMi\b|\bDo\b|\bFr\b|\bSa\b|\bSo\b)|\d{2}\.\d{2}\.\d{4}/.test(text || "");
    }

    function isOccupancyText(text) {
      return /Auslastung/i.test(text || "");
    }

    function isDirectionText(text) {
      return /→/.test(text || "") || /Bahnhof|Bhf|Feldkirch|Tisis|Rankweil|Sargans|Gisingen|Altenstadt|Klaus|Letze|Tosters/i.test(text || "");
    }

    function resetClasses(wrap) {
      wrap.querySelectorAll(".force-badge-white, .force-date-black, .force-text-black, .force-time-black, .force-time-red")
        .forEach(el => {
          el.classList.remove("force-badge-white", "force-date-black", "force-text-black", "force-time-black", "force-time-red");
        });
    }

    function styleBadges(wrap) {
      wrap.querySelectorAll("*").forEach(el => {
        const style = window.getComputedStyle(el);
        const bg = style.backgroundColor;
        if (bg && bg !== "rgba(0, 0, 0, 0)" && bg !== "transparent") {
          const txt = (el.textContent || "").trim();
          if (/Bus|Stadtbus|Landbus|Liechtenstein/i.test(txt)) {
            el.classList.add("force-badge-white");
          }
        }
      });
    }

    function styleDateAndText(wrap) {
      wrap.querySelectorAll("*").forEach(el => {
        const text = (el.textContent || "").trim();
        if (!text) return;

        if (isDateText(text)) {
          el.classList.add("force-date-black");
          return;
        }

        if (!isTimeText(text) && (isOccupancyText(text) || isDirectionText(text))) {
          el.classList.add("force-text-black");
        }
      });
    }

    function styleTimes(wrap) {
      const all = Array.from(wrap.querySelectorAll("*"));

      all.forEach(el => {
        const children = Array.from(el.children);
        if (!children.length) return;

        const timeChildren = children.filter(child => {
          const t = (child.textContent || "").trim();
          return isTimeText(t);
        });

        if (timeChildren.length === 2) {
          timeChildren[0].classList.add("force-time-black");
          timeChildren[1].classList.add("force-time-red");
        }
      });

      all.forEach(el => {
        const text = (el.textContent || "").trim();
        if (!isTimeText(text)) return;

        const parent = el.parentElement;
        if (!parent) return;

        const siblingTimes = Array.from(parent.children).filter(child =>
          isTimeText((child.textContent || "").trim())
        );

        if (siblingTimes.length === 1) {
          el.classList.add("force-time-black");
        }
      });
    }

    function styleWidget() {
      const wrap = document.getElementById("widgetWrap");
      if (!wrap) return;

      resetClasses(wrap);
      styleBadges(wrap);
      styleDateAndText(wrap);
      styleTimes(wrap);
    }

    function runStylingLoop() {
      styleWidget();
      setTimeout(styleWidget, 400);
      setTimeout(styleWidget, 1000);
      setTimeout(styleWidget, 2000);
    }

    window.addEventListener("load", runStylingLoop);

    const observer = new MutationObserver(() => {
      styleWidget();
    });

    window.addEventListener("load", () => {
      const wrap = document.getElementById("widgetWrap");
      if (wrap) {
        observer.observe(wrap, { childList: true, subtree: true, characterData: true });
      }
    });

    setInterval(() => {
      window.location.reload();
    }, 60000);
  </script>
</body>
</html>

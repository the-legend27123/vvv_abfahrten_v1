<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feldkirch Landesgericht – Abfahrtsmonitor</title>

  <script
    type="text/javascript"
    src="https://fahrplan.vmobil.at/webapp/staticfiles/hafas-widget-core.1.0.0.js?L=vs_vvv&">
  </script>

  <style>
    :root {
      --bg-1: #081018;
      --bg-2: #0d1621;
      --bg-3: #101b28;
      --panel-border: rgba(255,255,255,0.09);
      --text: #f5f7fa;
      --muted: #9aa8b7;
      --soft: #c8d2dc;
      --shadow: 0 18px 45px rgba(0,0,0,0.34);
      --shadow-soft: 0 10px 24px rgba(0,0,0,0.20);
      --widget-scale: 1.9;
      --widget-width: 78.125%;
      --accent: #6fd3ff;
      --accent-soft: rgba(111, 211, 255, 0.18);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(111,211,255,0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(255,213,74,0.08), transparent 22%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.02), rgba(255,255,255,0.00)),
        repeating-linear-gradient(
          180deg,
          rgba(255,255,255,0.015) 0px,
          rgba(255,255,255,0.015) 1px,
          transparent 1px,
          transparent 6px
        );
      opacity: 0.35;
    }

    .topbar {
      position: relative;
      padding: 24px 30px 10px;
      z-index: 1;
    }

    .topbar-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 18px 22px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .title-icon {
      width: 56px;
      height: 56px;
      min-width: 56px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffe27f 0%, #ffd54a 55%, #f3b800 100%);
      color: #111;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.02em;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.45),
        0 10px 24px rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.35);
    }

    .title-wrap {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 6px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    .title {
      margin: 0;
      font-size: 35px;
      line-height: 1.08;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 14px rgba(0,0,0,0.24);
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 15px;
      color: var(--soft);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      white-space: nowrap;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #dfe8ef;
      font-size: 13px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #4ade80;
      box-shadow: 0 0 12px rgba(74, 222, 128, 0.75);
      flex: 0 0 auto;
    }

    .stage {
      flex: 1;
      min-height: 0;
      padding: 18px 30px 22px;
      position: relative;
      z-index: 1;
    }

    .monitor-shell {
      width: 100%;
      height: 100%;
      position: relative;
      border-radius: 30px;
      padding: 22px;
      background: linear-gradient(180deg, rgba(18,29,42,0.96), rgba(10,17,26,0.98));
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .monitor-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background:
        radial-gradient(circle at top left, rgba(111,211,255,0.12), transparent 22%),
        radial-gradient(circle at bottom right, rgba(255,213,74,0.10), transparent 18%);
      opacity: 0.95;
    }

    .monitor-shell::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 29px;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,0.03);
    }

    .monitor-head {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      padding: 2px 2px 0;
    }

    .monitor-label {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .monitor-label-badge {
      padding: 9px 12px;
      border-radius: 14px;
      background: var(--accent-soft);
      color: #dff6ff;
      border: 1px solid rgba(111, 211, 255, 0.18);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .monitor-label-text {
      font-size: 14px;
      color: var(--muted);
    }

    .widget-card {
      position: relative;
      z-index: 1;
      width: 100%;
      height: calc(100% - 58px);
      min-height: 0;
      border-radius: 22px;
      padding: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      overflow: hidden;
    }

    .widget-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 0 8px;
      min-height: 34px;
      flex: 0 0 auto;
    }

    .widget-columns {
      display: grid;
      grid-template-columns: 140px 180px 1fr;
      align-items: center;
      width: 100%;
      max-width: 760px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #bcd0e3;
    }

    .col-title-abfahrt {
      transform: translateX(0px);
    }

    .col-title-linie {
      transform: translateX(0px);
    }

    .col-title-richtung {
      transform: translateX(0px);
    }

    .widget-updated {
      flex: 0 0 auto;
      font-size: 12px;
      color: #aebccc;
      white-space: nowrap;
    }

    .widget-stage {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .widget-wrap {
      width: 100%;
      height: auto;
      min-height: 0;
      background: #ffffff;
      border-radius: 16px;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,0.05),
        0 8px 24px rgba(0,0,0,0.12);
      scroll-behavior: smooth;
    }

    .zoom-wrap {
      transform: scale(var(--widget-scale));
      transform-origin: top left;
      width: var(--widget-width);
      min-height: 0;
    }

    .footer {
      position: relative;
      z-index: 1;
      padding: 0 30px 18px;
    }

    .footer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--muted);
      font-size: 12px;
    }

    .footer-left,
    .footer-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .footer-sep {
      opacity: 0.35;
    }

    .widget-wrap,
    .widget-wrap * {
      font-family: Arial, Helvetica, sans-serif !important;
    }

    .widget-wrap [style*="background"] *,
    .widget-wrap [class*="line"] *,
    .widget-wrap [class*="badge"] *,
    .widget-wrap [class*="product"] * {
      color: #ffffff !important;
    }

    .widget-wrap .force-black {
      color: #000000 !important;
      opacity: 1 !important;
    }

    .widget-wrap table,
    .widget-wrap tr,
    .widget-wrap td,
    .widget-wrap th {
      border-color: rgba(0,0,0,0.12) !important;
    }

    .widget-wrap::-webkit-scrollbar,
    .widget-stage::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .widget-wrap::-webkit-scrollbar-track,
    .widget-stage::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
    }

    .widget-wrap::-webkit-scrollbar-thumb,
    .widget-stage::-webkit-scrollbar-thumb {
      background: rgba(125,145,168,0.55);
      border-radius: 10px;
    }

    @media (max-width: 1100px) {
      :root {
        --widget-scale: 1.45;
        --widget-width: 83%;
      }

      .title {
        font-size: 29px;
      }

      .widget-columns {
        grid-template-columns: 120px 150px 1fr;
      }
    }

    @media (max-width: 900px) {
      :root {
        --widget-scale: 1.16;
        --widget-width: 86.2%;
      }

      .topbar {
        padding: 16px 16px 8px;
      }

      .topbar-card {
        padding: 14px 14px;
        border-radius: 18px;
      }

      .title-row {
        gap: 12px;
      }

      .title {
        font-size: 24px;
      }

      .subtitle {
        font-size: 13px;
      }

      .eyebrow {
        font-size: 10px;
      }

      .title-icon {
        width: 42px;
        height: 42px;
        min-width: 42px;
        font-size: 22px;
      }

      .status-pill {
        display: none;
      }

      .stage {
        padding: 12px 16px 14px;
      }

      .monitor-shell {
        padding: 14px;
        border-radius: 20px;
      }

      .widget-card {
        padding: 10px;
        border-radius: 16px;
      }

      .widget-meta {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }

      .widget-columns {
        grid-template-columns: 110px 130px 1fr;
        font-size: 11px;
        max-width: 100%;
      }

      .widget-wrap {
        border-radius: 12px;
      }

      .footer {
        padding: 0 16px 12px;
      }

      .footer-bar {
        padding: 10px 12px;
        border-radius: 12px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-card">
      <div class="title-row">
        <div class="title-icon">H</div>

        <div class="title-wrap">
          <p class="eyebrow">Live Abfahrten</p>
          <h1 class="title">Feldkirch Landesgericht</h1>
          <p class="subtitle">VMOBIL Abfahrtsmonitor</p>
        </div>
      </div>

      <div class="status-pill">
        <span class="status-dot"></span>
        <span>Live-Aktualisierung alle 60 Sekunden</span>
      </div>
    </div>
  </div>

  <div class="stage">
    <div class="monitor-shell">
      <div class="monitor-head">
        <div class="monitor-label">
          <div class="monitor-label-badge">Monitor</div>
          <div class="monitor-label-text">Abfahrten ab Haltestelle in Echtzeit-Ansicht</div>
        </div>
      </div>

      <div class="widget-card">
        <div class="widget-meta">
          <div class="widget-columns">
            <span class="col-title-abfahrt">Abfahrt</span>
            <span class="col-title-linie">Linie</span>
            <span class="col-title-richtung">Richtung</span>
          </div>
          <div class="widget-updated" id="lastUpdated">Zuletzt aktualisiert: --:--:--</div>
        </div>

        <div class="widget-stage">
          <div class="widget-wrap" id="widgetWrap">
            <div class="zoom-wrap">
              <div
                data-hfs-widget="true"
                data-hfs-widget-sq="true"
                data-hfs-widget-sq-location="A=1@O=Feldkirch Landesgericht@X=9592030@Y=47236085@U=81@L=480082400@p=1774303212@i=A×at:48:824@"
                data-hfs-widget-sq-locationname="Feldkirch Landesgericht"
                style="width:100%;">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-bar">
      <div class="footer-left">
        <span>VMOBIL Widget</span>
        <span class="footer-sep">•</span>
        <span>Stand: 24.03.2026 17:50</span>
      </div>
      <div class="footer-right">
        <span>Design v6</span>
      </div>
    </div>
  </div>

  <script>
    const AUTO_SCROLL_TOP = 135;

    function isTimeOnly(text) {
      return /^\s*\d{1,2}:\d{2}\s*$/.test(text);
    }

    function isHeaderText(text) {
      return /^Monitor\s*-\s*/i.test(text);
    }

    function isOccupancyText(text) {
      return /Auslastung/i.test(text);
    }

    function isDirectionText(text) {
      return text.includes("→") ||
        /Bahnhof|Bhf|Feldkirch|Tisis|Letze|Rankweil|Sargans|Gisingen|Altenstadt|Klaus|Tosters|Satteins|Nofels|Levis|Bangs|Schaan|LKH|Landeskrankenhaus|Muntlix|Eschen|Balzers|Trübbach|Dornau|Nenzing|Götzis|Ludesch|Meiningen|Vaduz|Post|Brederis|Krönele|Hirschmann|Gymnasium|Schulzentrum|Satteins/i.test(text);
    }

    function isLineText(text) {
      return /Bus\s*\d|Stadtbus|Landbus|Liechtenstein Bus/i.test(text);
    }

    function isBadge(el) {
      const style = window.getComputedStyle(el);
      const bg = style.backgroundColor;
      return bg && bg !== "rgba(0, 0, 0, 0)" && bg !== "transparent";
    }

    function scrollWidgetToPosition() {
      const wrap = document.getElementById("widgetWrap");
      if (!wrap) return;
      wrap.scrollTop = AUTO_SCROLL_TOP;
    }

    function updateLastUpdated() {
      const el = document.getElementById("lastUpdated");
      if (!el) return;

      const now = new Date();
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      const ss = String(now.getSeconds()).padStart(2, "0");

      el.textContent = `Zuletzt aktualisiert: ${hh}:${mm}:${ss}`;
    }

    function syncWidgetHeight() {
      const wrap = document.getElementById("widgetWrap");
      const zoom = wrap ? wrap.querySelector(".zoom-wrap") : null;
      const stage = document.querySelector(".widget-stage");

      if (!wrap || !zoom || !stage) return;

      const scale = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--widget-scale")) || 1;
      const naturalHeight = zoom.scrollHeight * scale;
      const maxHeight = stage.clientHeight;

      wrap.style.height = Math.min(naturalHeight, maxHeight) + "px";
    }

    function hideOnlyWidgetHeader() {
      const wrap = document.getElementById("widgetWrap");
      if (!wrap) return;

      const leaves = Array.from(wrap.querySelectorAll("*")).filter(el => el.children.length === 0);

      leaves.forEach(el => {
        const text = (el.textContent || "").trim();
        if (!text) return;

        if (isHeaderText(text)) {
          el.style.display = "none";
        }
      });
    }

    function styleLeafTexts() {
      const wrap = document.getElementById("widgetWrap");
      if (!wrap) return;

      const all = Array.from(wrap.querySelectorAll("*"));

      all.forEach(el => {
        const text = (el.textContent || "").trim();
        if (!text) return;

        el.classList.remove("force-black");
        el.style.removeProperty("opacity");

        if (isBadge(el)) {
          el.style.color = "#ffffff";
          el.style.opacity = "1";
          return;
        }

        if (/^\d{2}\.\d{2}\.\d{4}$/.test(text)) {
          el.style.color = "#5d5d5d";
          el.style.opacity = "1";
          return;
        }

        if (/^(Mo|Di|Mi|Do|Fr|Sa|So),?$/.test(text)) {
          el.style.color = "#5d5d5d";
          el.style.opacity = "1";
          return;
        }

        if (isTimeOnly(text)) {
          return;
        }

        if (isOccupancyText(text) || isDirectionText(text)) {
          el.classList.add("force-black");
        }
      });
    }

    function forceVeryLightTextsBlack() {
      const wrap = document.getElementById("widgetWrap");
      if (!wrap) return;

      const all = Array.from(wrap.querySelectorAll("*"));

      all.forEach(el => {
        const text = (el.textContent || "").trim();
        if (!text) return;

        if (isTimeOnly(text)) return;
        if (isHeaderText(text)) return;
        if (isLineText(text)) return;
        if (/^\d{2}\.\d{2}\.\d{4}$/.test(text)) return;
        if (/^(Mo|Di|Mi|Do|Fr|Sa|So),?$/.test(text)) return;
        if (isOccupancyText(text)) return;

        const style = window.getComputedStyle(el);
        const color = style.color;
        const opacity = parseFloat(style.opacity || "1");

        const isVeryLight =
          color === "rgb(255, 255, 255)" ||
          color === "rgba(255, 255, 255, 1)" ||
          opacity < 1 ||
          color === "rgb(239, 239, 239)" ||
          color === "rgb(240, 240, 240)" ||
          color === "rgb(241, 241, 241)" ||
          color === "rgb(242, 242, 242)";

        const looksLikeDirection =
          text.length > 2 &&
          !/^\d{1,2}:\d{2}$/.test(text) &&
          !/Auslastung/i.test(text) &&
          !/Bus\s*\d|Stadtbus|Landbus|Liechtenstein Bus/i.test(text);

        if (isVeryLight && looksLikeDirection) {
          el.classList.add("force-black");
        }
      });
    }

    function runStyling() {
      hideOnlyWidgetHeader();
      styleLeafTexts();
      forceVeryLightTextsBlack();
      updateLastUpdated();
      syncWidgetHeight();
    }

    window.addEventListener("load", () => {
      updateLastUpdated();
      runStyling();

      setTimeout(() => {
        runStyling();
        scrollWidgetToPosition();
      }, 400);

      setTimeout(() => {
        runStyling();
        scrollWidgetToPosition();
      }, 1000);

      setTimeout(() => {
        runStyling();
        scrollWidgetToPosition();
      }, 2000);
    });

    window.addEventListener("resize", () => {
      runStyling();
    });

    const observer = new MutationObserver(() => {
      runStyling();
      scrollWidgetToPosition();
    });

    window.addEventListener("load", () => {
      const wrap = document.getElementById("widgetWrap");
      if (wrap) {
        observer.observe(wrap, {
          childList: true,
          subtree: true,
          characterData: true
        });
      }
    });

    setInterval(() => {
      window.location.reload();
    }, 60000);
  </script>
</body>
</html>

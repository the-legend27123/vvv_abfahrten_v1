<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feldkirch Landesgericht – Abfahrtsmonitor</title>

  <script
    type="text/javascript"
    src="https://fahrplan.vmobil.at/webapp/staticfiles/hafas-widget-core.1.0.0.js?L=vs_vvv&">
  </script>

  <style>
    :root {
      --bg: #0b0f14;
      --panel-border: rgba(255,255,255,0.08);
      --text: #f5f7fa;
      --muted: #aab4bf;
      --shadow: 0 10px 30px rgba(0,0,0,0.28);
      --widget-scale: 1.9;
      --widget-width: 78.125%;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      padding: 20px 28px 10px;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .title-icon {
      width: 42px;
      height: 42px;
      min-width: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 4px 14px rgba(0,0,0,0.25));
    }

    .title-icon svg {
      width: 42px;
      height: 42px;
      display: block;
    }

    .title-wrap {
      display: flex;
      flex-direction: column;
    }

    .title {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
      font-weight: 700;
      color: #f5f7fa;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 15px;
      color: var(--muted);
    }

    .stage {
      flex: 1;
      min-height: 0;
      padding: 18px 28px 28px;
    }

    .monitor-shell {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #131a22, #0f141b);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .widget-wrap {
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: #ffffff;
      border-radius: 16px;
      overflow: auto;
      position: relative;
    }

    .zoom-wrap {
      transform: scale(var(--widget-scale));
      transform-origin: top left;
      width: var(--widget-width);
      min-height: 100%;
    }

    .footer {
      padding: 8px 28px 16px;
      font-size: 12px;
      color: var(--muted);
    }

    .widget-wrap,
    .widget-wrap * {
      font-family: Arial, Helvetica, sans-serif !important;
    }

    .widget-wrap [style*="background"] *,
    .widget-wrap [class*="line"] *,
    .widget-wrap [class*="badge"] *,
    .widget-wrap [class*="product"] * {
      color: #ffffff !important;
    }

    .widget-wrap .force-black {
      color: #000000 !important;
      opacity: 1 !important;
    }

    .widget-wrap table,
    .widget-wrap tr,
    .widget-wrap td,
    .widget-wrap th {
      border-color: rgba(0,0,0,0.12) !important;
    }

    @media (max-width: 900px) {
      :root {
        --widget-scale: 1.16;
        --widget-width: 86.2%;
      }

      .topbar {
        padding: 16px 16px 8px;
      }

      .title {
        font-size: 26px;
      }

      .subtitle {
        font-size: 14px;
      }

      .title-icon,
      .title-icon svg {
        width: 36px;
        height: 36px;
        min-width: 36px;
      }

      .stage {
        padding: 12px 16px 16px;
      }

      .monitor-shell {
        padding: 14px;
        border-radius: 16px;
      }

      .widget-wrap {
        border-radius: 12px;
      }

      .footer {
        padding: 6px 16px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title-row">
      <div class="title-icon" aria-hidden="true">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img">
          <circle cx="32" cy="32" r="32" fill="#f7c62f"/>
          <g fill="#1b2130">
            <path d="M20 49V26c0-8 4-13 12-13s12 5 12 13v23h-3v3.5c0 2.5-2 4.5-4.5 4.5S32 55 32 52.5V49h-8v3.5c0 2.5-2 4.5-4.5 4.5S15 55 15 52.5V49h5z"/>
            <rect x="23" y="17" width="18" height="3" rx="1.5"/>
            <path d="M25.5 22h13c1.6 0 2.9 1.2 3.1 2.8l1.7 10.5c.3 1.9-1.2 3.7-3.1 3.7H23.8c-1.9 0-3.4-1.8-3.1-3.7l1.7-10.5c.2-1.6 1.5-2.8 3.1-2.8z"/>
            <circle cx="22" cy="43" r="3"/>
            <circle cx="42" cy="43" r="3"/>
          </g>
        </svg>
      </div>
      <div class="title-wrap">
        <h1 class="title">Feldkirch Landesgericht</h1>
        <p class="subtitle">VMOBIL Abfahrtsmonitor</p>
      </div>
    </div>
  </div>

  <div class="stage">
    <div class="monitor-shell">
      <div class="widget-wrap" id="widgetWrap">
        <div class="zoom-wrap">
          <div
            data-hfs-widget="true"
            data-hfs-widget-sq="true"
            data-hfs-widget-sq-location="A=1@O=Feldkirch Landesgericht@X=9592030@Y=47236085@U=81@L=480082400@p=1774303212@i=A×at:48:824@"
            data-hfs-widget-sq-locationname="Feldkirch Landesgericht"
            style="width:100%;">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    Eingebettet über VMOBIL Widget | Stand 24.03.2026 13:03 | v3
  </div>

  <script>
    function isTimeOnly(text) {
      return /^\s*\d{1,2}:\d{2}\s*$/.test(text);
    }

    function isHeaderText(text) {
      return /^Monitor\s*-\s*/i.test(text);
    }

    function isOccupancyText(text) {
      return /Auslastung/i.test(text);
    }

    function isDirectionText(text) {
      return text.includes("→") ||
        /Bahnhof|Bhf|Feldkirch|Tisis|Letze|Rankweil|Sargans|Gisingen|Altenstadt|Klaus|Tosters|Satteins|Nofels|Levis|Bangs|Schaan|LKH|Landeskrankenhaus|Muntlix|Eschen|Dornbirn/i.test(text);
    }

    function isLineText(text) {
      return /Bus\s*\d|Stadtbus|Landbus|Liechtenstein Bus/i.test(text);
    }

    function isBadge(el) {
      const style = window.getComputedStyle(el);
      const bg = style.backgroundColor;
      return bg && bg !== "rgba(0, 0, 0, 0)" && bg !== "transparent";
    }

    function isExactDate(text) {
      return /^\d{2}\.\d{2}\.\d{4}$/.test(text);
    }

    function isExactWeekday(text) {
      return /^(Mo|Di|Mi|Do|Fr|Sa|So),?$/.test(text);
    }

    function setDateBlockGrey() {
      const wrap = document.getElementById("widgetWrap");
      if (!wrap) return;

      const all = Array.from(wrap.querySelectorAll("*"));

      all.forEach(el => {
        const text = (el.textContent || "").trim();
        if (!text) return;

        const hasWeekday = /\b(Mo|Di|Mi|Do|Fr|Sa|So)\b/.test(text);
        const hasDate = /\b\d{2}\.\d{2}\.\d{4}\b/.test(text);

        if (hasWeekday || hasDate) {
          el.style.color = "#5d5d5d";
          el.style.opacity = "1";

          el.querySelectorAll("*").forEach(child => {
            child.style.color = "#5d5d5d";
            child.style.opacity = "1";
          });
        }
      });
    }

    function hideOnlyWidgetHeader() {
      const wrap = document.getElementById("widgetWrap");
      if (!wrap) return;

      const leaves = Array.from(wrap.querySelectorAll("*")).filter(el => el.children.length === 0);

      leaves.forEach(el => {
        const text = (el.textContent || "").trim();
        if (!text) return;

        if (isHeaderText(text)) {
          el.style.display = "none";
        }
      });
    }

    function styleLeafTexts() {
      const wrap = document.getElementById("widgetWrap");
      if (!wrap) return;

      const all = Array.from(wrap.querySelectorAll("*"));

      all.forEach(el => {
        const text = (el.textContent || "").trim();
        if (!text) return;

        el.classList.remove("force-black");
        el.style.removeProperty("opacity");

        if (isBadge(el)) {
          el.style.color = "#ffffff";
          el.style.opacity = "1";
          return;
        }

        if (isExactDate(text) || isExactWeekday(text)) {
          el.style.color = "#5d5d5d";
          el.style.opacity = "1";
          return;
        }

        if (isTimeOnly(text)) {
          return;
        }

        if (isOccupancyText(text) || isDirectionText(text)) {
          el.classList.add("force-black");
        }
      });
    }

    function forceVeryLightTextsBlack() {
      const wrap = document.getElementById("widgetWrap");
      if (!wrap) return;

      const all = Array.from(wrap.querySelectorAll("*"));

      all.forEach(el => {
        const text = (el.textContent || "").trim();
        if (!text) return;

        if (isTimeOnly(text)) return;
        if (isHeaderText(text)) return;
        if (isLineText(text)) return;
        if (isExactDate(text)) return;
        if (isExactWeekday(text)) return;
        if (isOccupancyText(text)) return;

        const style = window.getComputedStyle(el);
        const color = style.color;
        const opacity = parseFloat(style.opacity || "1");

        const isVeryLight =
          color === "rgb(255, 255, 255)" ||
          color === "rgba(255, 255, 255, 1)" ||
          opacity < 1 ||
          color === "rgb(239, 239, 239)" ||
          color === "rgb(240, 240, 240)" ||
          color === "rgb(241, 241, 241)" ||
          color === "rgb(242, 242, 242)";

        const looksLikeDirection =
          text.length > 2 &&
          !/^\d{1,2}:\d{2}$/.test(text) &&
          !/Auslastung/i.test(text) &&
          !/Bus\s*\d|Stadtbus|Landbus|Liechtenstein Bus/i.test(text);

        if (isVeryLight && looksLikeDirection) {
          el.classList.add("force-black");
        }
      });
    }

    function runStyling() {
      hideOnlyWidgetHeader();
      styleLeafTexts();
      setDateBlockGrey();
      forceVeryLightTextsBlack();
    }

    window.addEventListener("load", () => {
      runStyling();
      setTimeout(runStyling, 400);
      setTimeout(runStyling, 1000);
      setTimeout(runStyling, 2000);
    });

    const observer = new MutationObserver(() => {
      runStyling();
    });

    window.addEventListener("load", () => {
      const wrap = document.getElementById("widgetWrap");
      if (wrap) {
        observer.observe(wrap, {
          childList: true,
          subtree: true,
          characterData: true
        });
      }
    });

    setInterval(() => {
      window.location.reload();
    }, 60000);
  </script>
</body>
</html>

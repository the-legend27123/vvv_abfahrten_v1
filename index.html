<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feldkirch Landesgericht – VMOBIL Abfahrtsmonitor</title>

  <script
    type="text/javascript"
    src="https://fahrplan.vmobil.at/webapp/staticfiles/hafas-widget-core.1.0.0.js?L=vs_vvv&">
  </script>

  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121821;
      --panel-border: rgba(255,255,255,0.08);
      --text: #f5f7fa;
      --muted: #aab4bf;
      --shadow: 0 10px 30px rgba(0,0,0,0.28);

      /* Hier Zoom anpassen */
      --widget-scale: 1.28;
      --widget-width: 78.125%;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      padding: 20px 28px 10px;
    }

    .title {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
      font-weight: 700;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 15px;
      color: var(--muted);
    }

    .stage {
      flex: 1;
      min-height: 0;
      padding: 18px 28px 28px;
    }

    .monitor-shell {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #131a22, #0f141b);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .widget-wrap {
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: #ffffff;
      border-radius: 16px;
      overflow: auto;
      padding: 0;
      position: relative;
    }

    .zoom-wrap {
      transform: scale(var(--widget-scale));
      transform-origin: top left;
      width: var(--widget-width);
      min-height: 100%;
    }

    .footer {
      padding: 8px 28px 16px;
      font-size: 12px;
      color: var(--muted);
    }

    /* Lesbarkeit im Widget verbessern */
    .widget-wrap,
    .widget-wrap * {
      font-family: Arial, Helvetica, sans-serif !important;
    }

    .widget-wrap a,
    .widget-wrap span,
    .widget-wrap div,
    .widget-wrap td,
    .widget-wrap th,
    .widget-wrap p,
    .widget-wrap small,
    .widget-wrap strong {
      color: #1c1f23 !important;
    }

    .widget-wrap .journey-route-desc,
    .widget-wrap .journey-direction,
    .widget-wrap .direction,
    .widget-wrap .destination,
    .widget-wrap .towards,
    .widget-wrap .prod,
    .widget-wrap .label,
    .widget-wrap .mot,
    .widget-wrap .station,
    .widget-wrap .route,
    .widget-wrap [class*="direction"],
    .widget-wrap [class*="destination"],
    .widget-wrap [class*="towards"],
    .widget-wrap [class*="route"],
    .widget-wrap [class*="desc"] {
      color: #2a2f35 !important;
      opacity: 1 !important;
    }

    .widget-wrap [style*="color: rgb(255, 255, 255)"],
    .widget-wrap [style*="color:#fff"],
    .widget-wrap [style*="color: #fff"],
    .widget-wrap [style*="color:#ffffff"],
    .widget-wrap [style*="color: #ffffff"] {
      color: #2a2f35 !important;
    }

    .widget-wrap table,
    .widget-wrap tr,
    .widget-wrap td,
    .widget-wrap th {
      border-color: rgba(0,0,0,0.12) !important;
    }

    /* optional etwas kräftigere Zeit-/Textdarstellung */
    .widget-wrap [class*="time"],
    .widget-wrap [class*="date"],
    .widget-wrap [class*="journey"],
    .widget-wrap [class*="platform"],
    .widget-wrap [class*="line"],
    .widget-wrap [class*="product"],
    .widget-wrap [class*="mot-label"],
    .widget-wrap [class*="badge"] {
      opacity: 1 !important;
    }

    @media (max-width: 900px) {
      :root {
        --widget-scale: 1.16;
        --widget-width: 86.2%;
      }

      .topbar {
        padding: 16px 16px 8px;
      }

      .title {
        font-size: 26px;
      }

      .subtitle {
        font-size: 14px;
      }

      .stage {
        padding: 12px 16px 16px;
      }

      .monitor-shell {
        padding: 14px;
        border-radius: 16px;
      }

      .widget-wrap {
        border-radius: 12px;
      }

      .footer {
        padding: 6px 16px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1 class="title">Feldkirch Landesgericht</h1>
    <p class="subtitle">VMOBIL Abfahrtsmonitor</p>
  </div>

  <div class="stage">
    <div class="monitor-shell">
      <div class="widget-wrap">
        <div class="zoom-wrap">
          <div
            data-hfs-widget="true"
            data-hfs-widget-sq="true"
            data-hfs-widget-sq-location="A=1@O=Feldkirch Landesgericht@X=9592030@Y=47236085@U=81@L=480082400@p=1774215648@i=A×at:48:824@"
            data-hfs-widget-sq-locationname="Feldkirch Landesgericht"
            style="width:100%;">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    Eingebettet über VMOBIL Widget
  </div>

  <script>
    setInterval(() => {
      window.location.reload();
    }, 60000);
  </script>
</body>
</html>

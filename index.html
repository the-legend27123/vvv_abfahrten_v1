<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feldkirch Landesgericht – Abfahrtsmonitor</title>

  <script
    type="text/javascript"
    src="https://fahrplan.vmobil.at/webapp/staticfiles/hafas-widget-core.1.0.0.js?L=vs_vvv&">
  </script>

  <style>
    :root {
      --bg: #0b0f14;
      --panel-border: rgba(255,255,255,0.08);
      --text: #f5f7fa;
      --muted: #aab4bf;
      --shadow: 0 10px 30px rgba(0,0,0,0.28);
      --widget-scale: 1.9;
      --widget-width: 78.125%;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .stage {
      flex: 1;
      min-height: 0;
      padding: 18px 28px 28px;
    }

    .monitor-shell {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #131a22, #0f141b);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .widget-wrap {
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: #ffffff;
      border-radius: 16px;
      overflow: auto;
      position: relative;
    }

    .zoom-wrap {
      transform: scale(var(--widget-scale));
      transform-origin: top left;
      width: var(--widget-width);
      min-height: 100%;
    }

    .footer {
      padding: 8px 28px 16px;
      font-size: 12px;
      color: var(--muted);
    }

    .widget-wrap,
    .widget-wrap * {
      font-family: Arial, Helvetica, sans-serif !important;
    }

    /* Linienbadge weiß */
    .widget-wrap [style*="background"] *,
    .widget-wrap [class*="line"] *,
    .widget-wrap [class*="badge"] *,
    .widget-wrap [class*="product"] * {
      color: #ffffff !important;
    }

    /* Normale Texte in Abfahrten schwarz */
    .widget-wrap .force-black {
      color: #000000 !important;
      opacity: 1 !important;
    }

    .widget-wrap table,
    .widget-wrap tr,
    .widget-wrap td,
    .widget-wrap th {
      border-color: rgba(0,0,0,0.12) !important;
    }

    @media (max-width: 900px) {
      :root {
        --widget-scale: 1.16;
        --widget-width: 86.2%;
      }

      .stage { padding: 12px 16px 16px; }
      .monitor-shell { padding: 14px; border-radius: 16px; }
      .widget-wrap { border-radius: 12px; }
      .footer { padding: 6px 16px 12px; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="monitor-shell">
      <div class="widget-wrap" id="widgetWrap">
        <div class="zoom-wrap">
          <div
            data-hfs-widget="true"
            data-hfs-widget-sq="true"
            data-hfs-widget-sq-location="A=1@O=Feldkirch Landesgericht@X=9592030@Y=47236085@U=81@L=480082400@p=1774303212@i=A×at:48:824@"
            data-hfs-widget-sq-locationname="Feldkirch Landesgericht"
            style="width:100%;">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    Eingebettet über VMOBIL Widget | Stand 24.03.2026 11:54 | v2
  </div>

  <script>
    function isTimeOnly(text) {
      return /^\s*\d{1,2}:\d{2}\s*$/.test(text);
    }

    function isDateText(text) {
      return /(\bMo\b|\bDi\b|\bMi\b|\bDo\b|\bFr\b|\bSa\b|\bSo\b)|\d{2}\.\d{2}\.\d{4}/.test(text);
    }

    function isHeaderText(text) {
      return /^Monitor\s*-\s*/i.test(text);
    }

    function isOccupancyText(text) {
      return /Auslastung/i.test(text);
    }

    function isDirectionText(text) {
      return text.includes("→") ||
        /Bahnhof|Bhf|Feldkirch|Tisis|Rankweil|Sargans|Gisingen|Altenstadt|Klaus|Tosters|Letze|Satteins|Nofels|Levis|Bangs/i.test(text);
    }

    function isBadge(el) {
      const style = window.getComputedStyle(el);
      const bg = style.backgroundColor;
      return bg && bg !== "rgba(0, 0, 0, 0)" && bg !== "transparent";
    }

    function hideHeaderAndDate() {
      const wrap = document.getElementById("widgetWrap");
      if (!wrap) return;

      const all = Array.from(wrap.querySelectorAll("*"));

      all.forEach(el => {
        const text = (el.textContent || "").trim();
        if (!text) return;

        if (isHeaderText(text) || isDateText(text)) {
          const row = el.closest("tr, .journey, .journeyRow, .row, li, section, article, div");
          if (row) {
            row.style.display = "none";
          } else {
            el.style.display = "none";
          }
        }
      });
    }

    function styleLeafTexts() {
      const wrap = document.getElementById("widgetWrap");
      if (!wrap) return;

      const leaves = Array.from(wrap.querySelectorAll("*")).filter(el => el.children.length === 0);

      leaves.forEach(el => {
        const text = (el.textContent || "").trim();
        if (!text) return;

        el.classList.remove("force-black");
        el.style.removeProperty("opacity");

        if (isTimeOnly(text)) {
          return;
        }

        if (isBadge(el)) {
          el.style.color = "#ffffff";
          el.style.opacity = "1";
          return;
        }

        if (isOccupancyText(text) || isDirectionText(text)) {
          el.classList.add("force-black");
          return;
        }
      });
    }

    function forceVisibleRowsBlack() {
      const wrap = document.getElementById("widgetWrap");
      if (!wrap) return;

      const candidates = Array.from(wrap.querySelectorAll("div, span, p, td, small, strong"));

      candidates.forEach(el => {
        const text = (el.textContent || "").trim();
        if (!text) return;
        if (isTimeOnly(text)) return;
        if (isDateText(text)) return;
        if (isHeaderText(text)) return;
        if (/Bus\s*\d|Stadtbus|Landbus|Liechtenstein Bus/i.test(text)) return;

        const style = window.getComputedStyle(el);
        const color = style.color;
        const opacity = parseFloat(style.opacity || "1");

        const isVeryLightText =
          color === "rgb(255, 255, 255)" ||
          opacity < 1;

        if (isVeryLightText) {
          el.classList.add("force-black");
        }
      });
    }

    function runStyling() {
      hideHeaderAndDate();
      styleLeafTexts();
      forceVisibleRowsBlack();
    }

    window.addEventListener("load", () => {
      runStyling();
      setTimeout(runStyling, 400);
      setTimeout(runStyling, 1000);
      setTimeout(runStyling, 2000);
    });

    const observer = new MutationObserver(() => {
      runStyling();
    });

    window.addEventListener("load", () => {
      const wrap = document.getElementById("widgetWrap");
      if (wrap) {
        observer.observe(wrap, {
          childList: true,
          subtree: true,
          characterData: true
        });
      }
    });

    setInterval(() => {
      window.location.reload();
    }, 60000);
  </script>
</body>
</html>

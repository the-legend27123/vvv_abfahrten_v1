<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feldkirch Landesgericht – Abfahrtsmonitor</title>

  <script
    type="text/javascript"
    src="https://fahrplan.vmobil.at/webapp/staticfiles/hafas-widget-core.1.0.0.js?L=vs_vvv&">
  </script>

  <style>
    :root {
      --bg: #0b0f14;
      --panel-border: rgba(255,255,255,0.08);
      --text: #f5f7fa;
      --muted: #aab4bf;
      --shadow: 0 10px 30px rgba(0,0,0,0.28);
      --widget-scale: 1.9;
      --widget-width: 78.125%;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      padding: 20px 28px 10px;
    }

    .title {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
      font-weight: 700;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 15px;
      color: var(--muted);
    }

    .stage {
      flex: 1;
      min-height: 0;
      padding: 18px 28px 28px;
    }

    .monitor-shell {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #131a22, #0f141b);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .widget-wrap {
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: #ffffff;
      border-radius: 16px;
      overflow: auto;
      position: relative;
    }

    .zoom-wrap {
      transform: scale(var(--widget-scale));
      transform-origin: top left;
      width: var(--widget-width);
      min-height: 100%;
    }

    .footer {
      padding: 8px 28px 16px;
      font-size: 12px;
      color: var(--muted);
    }

    .widget-wrap,
    .widget-wrap * {
      font-family: Arial, Helvetica, sans-serif !important;
    }

    /* Linie / Badge weiß */
    .widget-wrap [class*="line"] *,
    .widget-wrap [class*="badge"] *,
    .widget-wrap [class*="product"] *,
    .widget-wrap [class*="serviceline"] *,
    .widget-wrap [class*="mot-label"] * {
      color: #ffffff !important;
    }

    /* Richtung / Auslastung / Datum schwarz */
    .force-black,
    .force-black * {
      color: #000000 !important;
      opacity: 1 !important;
    }

    /* Unsere Zeitfarben */
    .dep-time-main {
      color: #111111 !important;
      display: block;
      line-height: 1.1;
    }

    .dep-time-delay {
      color: #d4002a !important;
      display: block;
      line-height: 1.1;
    }

    .widget-wrap table,
    .widget-wrap tr,
    .widget-wrap td,
    .widget-wrap th {
      border-color: rgba(0,0,0,0.12) !important;
    }

    @media (max-width: 900px) {
      :root {
        --widget-scale: 1.16;
        --widget-width: 86.2%;
      }

      .topbar { padding: 16px 16px 8px; }
      .title { font-size: 26px; }
      .subtitle { font-size: 14px; }
      .stage { padding: 12px 16px 16px; }
      .monitor-shell { padding: 14px; border-radius: 16px; }
      .widget-wrap { border-radius: 12px; }
      .footer { padding: 6px 16px 12px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1 class="title">Feldkirch Landesgericht</h1>
    <p class="subtitle">VMOBIL Abfahrtsmonitor v1</p>
  </div>

  <div class="stage">
    <div class="monitor-shell">
      <div class="widget-wrap" id="widgetWrap">
        <div class="zoom-wrap">
          <div
            data-hfs-widget="true"
            data-hfs-widget-sq="true"
            data-hfs-widget-sq-location="A=1@O=Feldkirch Landesgericht@X=9592030@Y=47236085@U=81@L=480082400@p=1774303212@i=A×at:48:824@"
            data-hfs-widget-sq-locationname="Feldkirch Landesgericht"
            style="width:100%;">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    Eingebettet über VMOBIL Widget
  </div>

  <script>
  function styleDateAndTimes() {
    const wrap = document.getElementById("widgetWrap");
    if (!wrap) return;

    /* DI + Datum schwarz */
    wrap.querySelectorAll("*").forEach(el => {
      const txt = (el.textContent || "").trim();

      if (/^(Mo|Di|Mi|Do|Fr|Sa|So),?\s*\d{2}\.\d{2}\.\d{4}$/.test(txt) ||
          /^(Mo|Di|Mi|Do|Fr|Sa|So)$/.test(txt) ||
          /^\d{2}\.\d{2}\.\d{4}$/.test(txt)) {
        el.style.color = "#000";
        el.querySelectorAll("*").forEach(child => {
          child.style.color = "#000";
        });
      }
    });

    /* Nur Uhrzeit-Spalte bearbeiten */
    wrap.querySelectorAll("*").forEach(el => {
      if (el.dataset.timeStyled === "1") return;
      if (el.children.length > 0) return;

      const raw = (el.innerText || el.textContent || "").trim();
      if (!raw) return;

      const matches = raw.match(/\b\d{1,2}:\d{2}\b/g);
      if (!matches) return;

      /* genau 2 Uhrzeiten = geplante Zeit + Verspätung */
      if (matches.length === 2) {
        el.innerHTML = `
          <span style="display:block; color:#111; line-height:1.1;">${matches[0]}</span>
          <span style="display:block; color:#d4002a; line-height:1.1;">${matches[1]}</span>
        `;
        el.dataset.timeStyled = "1";
      }

      /* genau 1 Uhrzeit = normal schwarz */
      if (matches.length === 1 && raw === matches[0]) {
        el.innerHTML = `
          <span style="display:block; color:#111; line-height:1.1;">${matches[0]}</span>
        `;
        el.dataset.timeStyled = "1";
      }
    });
  }

  function runStyling() {
    styleDateAndTimes();
  }

  window.addEventListener("load", () => {
    runStyling();
    setTimeout(runStyling, 500);
    setTimeout(runStyling, 1200);
    setTimeout(runStyling, 2500);
  });

  const observer = new MutationObserver(() => {
    runStyling();
  });

  window.addEventListener("load", () => {
    const wrap = document.getElementById("widgetWrap");
    if (wrap) {
      observer.observe(wrap, {
        childList: true,
        subtree: true,
        characterData: true
      });
    }
  });

  setInterval(() => {
    window.location.reload();
  }, 60000);
</script>
</body>
</html>

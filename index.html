<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feldkirch Landesgericht – Abfahrtsmonitor TEST</title>

  <script
    type="text/javascript"
    src="https://fahrplan.vmobil.at/webapp/staticfiles/hafas-widget-core.1.0.0.js?L=vs_vvv&">
  </script>

  <style>
    :root {
      --bg: #0b0f14;
      --panel-border: rgba(255,255,255,0.08);
      --text: #f5f7fa;
      --muted: #aab4bf;
      --shadow: 0 10px 30px rgba(0,0,0,0.28);
      --widget-scale: 1.9;
      --widget-width: 78.125%;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      padding: 20px 28px 10px;
    }

    .title {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
      font-weight: 700;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 15px;
      color: var(--muted);
    }

    .stage {
      flex: 1;
      min-height: 0;
      padding: 18px 28px 28px;
    }

    .monitor-shell {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #131a22, #0f141b);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .widget-wrap {
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: #ffffff;
      border-radius: 16px;
      overflow: auto;
      position: relative;
    }

    .zoom-wrap {
      transform: scale(var(--widget-scale));
      transform-origin: top left;
      width: var(--widget-width);
      min-height: 100%;
    }

    .footer {
      padding: 8px 28px 16px;
      font-size: 12px;
      color: var(--muted);
    }

    .widget-wrap,
    .widget-wrap * {
      font-family: Arial, Helvetica, sans-serif !important;
    }

    /* Linienbadge weiß */
    .widget-wrap [style*="background"] *,
    .widget-wrap [class*="line"] *,
    .widget-wrap [class*="badge"] *,
    .widget-wrap [class*="product"] * {
      color: #ffffff !important;
    }

    /* Nur sehr gezielt Datum schwarz */
    .widget-wrap .force-date-black,
    .widget-wrap .force-date-black * {
      color: #000000 !important;
      opacity: 1 !important;
    }

    /* Fahrtrichtung / Auslastung schwarz */
    .widget-wrap .force-text-black,
    .widget-wrap .force-text-black * {
      color: #000000 !important;
      opacity: 1 !important;
    }

    /* Verspätung bewusst NICHT überschreiben */
    .widget-wrap .keep-delay-color,
    .widget-wrap .keep-delay-color * {
      color: inherit !important;
    }

    .widget-wrap table,
    .widget-wrap tr,
    .widget-wrap td,
    .widget-wrap th {
      border-color: rgba(0,0,0,0.12) !important;
    }

    @media (max-width: 900px) {
      :root {
        --widget-scale: 1.16;
        --widget-width: 86.2%;
      }

      .topbar { padding: 16px 16px 8px; }
      .title { font-size: 26px; }
      .subtitle { font-size: 14px; }
      .stage { padding: 12px 16px 16px; }
      .monitor-shell { padding: 14px; border-radius: 16px; }
      .widget-wrap { border-radius: 12px; }
      .footer { padding: 6px 16px 12px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1 class="title">Feldkirch Landesgericht</h1>
    <p class="subtitle">VMOBIL Abfahrtsmonitor</p>
  </div>

  <div class="stage">
    <div class="monitor-shell">
      <div class="widget-wrap" id="widgetWrap">
        <div class="zoom-wrap">
          <div
            data-hfs-widget="true"
            data-hfs-widget-sq="true"
            data-hfs-widget-sq-location="A=1@O=Feldkirch Landesgericht@X=9592030@Y=47236085@U=81@L=480082400@p=1774303212@i=A×at:48:824@"
            data-hfs-widget-sq-locationname="Feldkirch Landesgericht"
            style="width:100%;">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    Eingebettet über VMOBIL Widget
  </div>

  <script>
    function isTimeText(text) {
      return /^\s*\d{1,2}:\d{2}\s*$/.test(text);
    }

    function isDateText(text) {
      return /(\bMo\b|\bDi\b|\bMi\b|\bDo\b|\bFr\b|\bSa\b|\bSo\b)|\d{2}\.\d{2}\.\d{4}/.test(text);
    }

    function isOccupancyText(text) {
      return /Auslastung/i.test(text);
    }

    function isDirectionText(text) {
      return /→/.test(text) || /Bahnhof|Bhf|Feldkirch|Tisis|Rankweil|Sargans|Gisingen|Altenstadt|Klaus/i.test(text);
    }

    function isBadge(el) {
      const style = window.getComputedStyle(el);
      const bg = style.backgroundColor;
      return bg && bg !== "rgba(0, 0, 0, 0)" && bg !== "transparent";
    }

    function styleWidget() {
      const wrap = document.getElementById("widgetWrap");
      if (!wrap) return;

      const all = wrap.querySelectorAll("*");

      all.forEach(el => {
        const text = (el.textContent || "").trim();
        if (!text) return;

        el.classList.remove("force-text-black", "force-date-black", "keep-delay-color");

        if (isBadge(el)) {
          el.style.color = "#ffffff";
          return;
        }

        if (isTimeText(text)) {
          return; // Zeiten nicht anfassen, damit Verspätungen rot bleiben
        }

        if (isDateText(text)) {
          el.classList.add("force-date-black");
          return;
        }

        if (isOccupancyText(text) || isDirectionText(text)) {
          el.classList.add("force-text-black");
        }
      });
    }

    function runStylingLoop() {
      styleWidget();
      setTimeout(styleWidget, 500);
      setTimeout(styleWidget, 1200);
      setTimeout(styleWidget, 2500);
    }

    window.addEventListener("load", runStylingLoop);

    const observer = new MutationObserver(() => {
      styleWidget();
    });

    window.addEventListener("load", () => {
      const wrap = document.getElementById("widgetWrap");
      if (wrap) {
        observer.observe(wrap, { childList: true, subtree: true, characterData: true });
      }
    });

    setInterval(() => {
      window.location.reload();
    }, 60000);
  </script>
</body>
</html>
